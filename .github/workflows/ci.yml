name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Verify SDK imports
        run: |
          python -c "
          from agent_framework.sdk import AgentSDK, SDKConfig
          sdk = AgentSDK(SDKConfig())
          methods = [m for m in dir(sdk) if not m.startswith('_') and callable(getattr(sdk, m))]
          print(f'SDK: {len(methods)} public methods')
          assert len(methods) >= 89, f'Expected >=89 methods, got {len(methods)}'
          print('SDK integrity check passed')
          "
